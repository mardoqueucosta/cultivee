<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a"/>
      <stop offset="100%" style="stop-color:#15803d"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Leaf/sprout icon -->
  <g transform="translate(256,280) scale(1,-1)">
    <!-- Stem -->
    <path d="M0,-120 Q0,-40 0,20" stroke="#fff" stroke-width="18" fill="none" stroke-linecap="round"/>
    <!-- Left leaf -->
    <path d="M0,20 Q-80,80 -60,160 Q-10,140 0,80" fill="#fff" opacity="0.9"/>
    <!-- Right leaf (larger) -->
    <path d="M0,40 Q90,110 70,200 Q10,170 0,100" fill="#fff"/>
    <!-- Small left leaf -->
    <path d="M0,-20 Q-50,20 -40,80 Q-5,60 0,20" fill="#fff" opacity="0.7"/>
  </g>
</svg>
