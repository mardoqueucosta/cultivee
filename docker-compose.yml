services:
  site:
    build:
      context: ./site
      dockerfile: Dockerfile
    container_name: cultivee-site
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cultivee-site.rule=Host(`cultivee.com.br`) || Host(`www.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-site.entrypoints=websecure"
      - "traefik.http.routers.cultivee-site.tls.certresolver=letsencrypt"
      - "traefik.http.services.cultivee-site.loadbalancer.server.port=80"

  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cultivee-app
    restart: unless-stopped
    environment:
      - DATA_DIR=/app/data/images
      - DB_PATH=/app/data/cultivee.db
    volumes:
      - cultivee-data:/app/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cultivee-app.rule=Host(`app.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-app.entrypoints=websecure"
      - "traefik.http.routers.cultivee-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cultivee-app-http.rule=Host(`app.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-app-http.entrypoints=web"
      - "traefik.http.services.cultivee-app.loadbalancer.server.port=5000"

  ctrl:
    build:
      context: ./server-ctrl
      dockerfile: Dockerfile
    container_name: cultivee-ctrl
    restart: unless-stopped
    environment:
      - DB_PATH=/app/data/cultivee-ctrl.db
    volumes:
      - cultivee-ctrl-data:/app/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cultivee-ctrl.rule=Host(`hidro.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-ctrl.entrypoints=websecure"
      - "traefik.http.routers.cultivee-ctrl.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cultivee-ctrl-http.rule=Host(`hidro.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-ctrl-http.entrypoints=web"
      - "traefik.http.services.cultivee-ctrl.loadbalancer.server.port=5002"

volumes:
  cultivee-data:
  cultivee-ctrl-data:

networks:
  web:
    external: true
