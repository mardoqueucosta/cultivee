services:
  site:
    build:
      context: ./site
      dockerfile: Dockerfile
    container_name: cultivee-site
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cultivee-site.rule=Host(`cultivee.com.br`) || Host(`www.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-site.entrypoints=websecure"
      - "traefik.http.routers.cultivee-site.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cultivee-site-http.rule=Host(`cultivee.com.br`) || Host(`www.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-site-http.entrypoints=web"
      - "traefik.http.routers.cultivee-site-http.middlewares=https-redirect@file"
      - "traefik.http.services.cultivee-site.loadbalancer.server.port=80"

  # Produto: Hidroponia (ESP32-WROOM, sem camera)
  ctrl:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cultivee-ctrl
    restart: unless-stopped
    environment:
      - MODULE_TYPE=ctrl
      - API_PREFIX=/api/ctrl
      - PORT=5002
      - DB_PATH=/app/data/cultivee-ctrl.db
    volumes:
      - cultivee-ctrl-data:/app/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cultivee-ctrl.rule=Host(`hidro.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-ctrl.entrypoints=websecure"
      - "traefik.http.routers.cultivee-ctrl.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cultivee-ctrl-http.rule=Host(`hidro.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-ctrl-http.entrypoints=web"
      - "traefik.http.services.cultivee-ctrl.loadbalancer.server.port=5002"

  # Produto: HidroCam (ESP32-WROVER, hidro + camera)
  hidro-cam:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cultivee-hidro-cam
    restart: unless-stopped
    environment:
      - MODULE_TYPE=hidro-cam
      - API_PREFIX=/api/hidro-cam
      - PORT=5003
      - DB_PATH=/app/data/cultivee-hidro-cam.db
      - DATA_DIR=/app/data
    volumes:
      - cultivee-hidro-cam-data:/app/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cultivee-hidro-cam.rule=Host(`hidro-cam.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-hidro-cam.entrypoints=websecure"
      - "traefik.http.routers.cultivee-hidro-cam.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cultivee-hidro-cam-http.rule=Host(`hidro-cam.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-hidro-cam-http.entrypoints=web"
      - "traefik.http.services.cultivee-hidro-cam.loadbalancer.server.port=5003"

volumes:
  cultivee-ctrl-data:
  cultivee-hidro-cam-data:

networks:
  web:
    external: true
