services:
  site:
    build:
      context: ./site
      dockerfile: Dockerfile
    container_name: cultivee-site
    restart: unless-stopped
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cultivee-site.rule=Host(`cultivee.com.br`) || Host(`www.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-site.entrypoints=websecure"
      - "traefik.http.routers.cultivee-site.tls.certresolver=letsencrypt"
      - "traefik.http.routers.cultivee-site-http.rule=Host(`cultivee.com.br`) || Host(`www.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-site-http.entrypoints=web"
      - "traefik.http.routers.cultivee-site-http.middlewares=https-redirect@file"
      - "traefik.http.services.cultivee-site.loadbalancer.server.port=80"

  # Servidor unificado — serve todos os tipos de modulo (ctrl, cam, hidro-cam)
  app:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cultivee-app
    restart: unless-stopped
    environment:
      - PORT=5002
      - DB_PATH=/app/data/cultivee.db
      - DATA_DIR=/app/data
    volumes:
      - cultivee-data:/app/data
    networks:
      - web
    labels:
      - "traefik.enable=true"
      # HTTPS — PWA e navegadores
      - "traefik.http.routers.cultivee-app.rule=Host(`app.cultivee.com.br`) || Host(`hidro.cultivee.com.br`) || Host(`hidro-cam.cultivee.com.br`) || Host(`cam.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-app.entrypoints=websecure"
      - "traefik.http.routers.cultivee-app.tls.certresolver=letsencrypt"
      # HTTP — ESP32 (sem TLS, nao redireciona)
      - "traefik.http.routers.cultivee-app-http.rule=Host(`app.cultivee.com.br`) || Host(`hidro.cultivee.com.br`) || Host(`hidro-cam.cultivee.com.br`) || Host(`cam.cultivee.com.br`)"
      - "traefik.http.routers.cultivee-app-http.entrypoints=web"
      - "traefik.http.services.cultivee-app.loadbalancer.server.port=5002"

volumes:
  cultivee-data:

networks:
  web:
    external: true
